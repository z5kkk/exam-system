<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>管理后台 | ExamPro</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-mesh">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
  </div>

  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">📝</div>
        <div>
          <div class="sidebar-brand-text">ExamPro</div>
          <div class="sidebar-brand-sub">管理后台</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-item-icon">📊</span> 数据概览
        </button>
        <button class="nav-item" data-page="exams">
          <span class="nav-item-icon">📋</span> 考试管理
        </button>
        <button class="nav-item" data-page="banks">
          <span class="nav-item-icon">📚</span> 题库管理
        </button>
        <button class="nav-item" data-page="questions">
          <span class="nav-item-icon">📝</span> 题目管理
        </button>
        <button class="nav-item" data-page="results">
          <span class="nav-item-icon">📈</span> 成绩分析
        </button>
        <button class="nav-item" data-page="submissions">
          <span class="nav-item-icon">📊</span> 成绩管理
        </button>
        <button class="nav-item" data-page="users">
          <span class="nav-item-icon">👥</span> 用户管理
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary" style="width:100%" onclick="location.href='/'">← 返回考生端</button>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="top-bar">
        <div class="flex gap-2" style="align-items:center">
          <button class="mobile-menu-btn btn-icon" onclick="toggleSidebar()">☰</button>
          <h1 class="top-bar-title" id="pageTitle">数据概览</h1>
        </div>
        <div class="top-bar-actions">
          <button class="theme-toggle" id="themeToggle" title="切换主题">☀️</button>
          <span style="font-size:0.85rem;color:var(--text-tertiary);font-weight:600" id="adminUser"></span>
          <button class="btn btn-sm btn-secondary" onclick="handleLogout()">退出</button>
        </div>
      </div>

      <div id="pageContent"></div>
    </main>
  </div>

  <div id="modalContainer"></div>
  <div id="toastContainer"></div>

  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav" id="mobileBottomNav">
    <button class="mobile-tab-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
      <span class="tab-icon">📊</span>概览
    </button>
    <button class="mobile-tab-item" data-page="exams" onclick="navigateTo('exams')">
      <span class="tab-icon">📋</span>考试
    </button>
    <button class="mobile-tab-item" data-page="submissions" onclick="navigateTo('submissions')">
      <span class="tab-icon">📈</span>成绩
    </button>
    <button class="mobile-tab-item" data-page="users" onclick="navigateTo('users')">
      <span class="tab-icon">👥</span>用户
    </button>
  </nav>

  <script>
    const API = '';
    let state = {
      token: localStorage.getItem('admin_token'),
      user: JSON.parse(localStorage.getItem('admin_user') || 'null'),
      currentPage: 'dashboard',
      exams: [],
      currentExamId: null,
      stats: null
    };

    // ============================================================
    // Init
    // ============================================================
    function initTheme() {
      const saved = localStorage.getItem('admin_theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '🌙' : '☀️';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('admin_theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);

      if (!state.token || !state.user || state.user.role !== 'admin') {
        showLoginPage();
        return;
      }

      document.getElementById('adminUser').textContent = state.user.username;
      setupSidebar();
      navigateTo('dashboard');
    });

    // ============================================================
    // Auth
    // ============================================================
    function showLoginPage() {
      // Hide mobile nav during login
      const mobileNav = document.getElementById('mobileBottomNav');
      if (mobileNav) mobileNav.style.display = 'none';
      document.querySelector('.admin-layout').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;width:100%;position:relative;z-index:1">
          <div class="glass-card" style="padding:48px 40px;max-width:400px;width:90%">
            <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:8px;color:var(--text-primary);letter-spacing:-0.03em">管理员登录</h1>
            <p style="color:var(--text-tertiary);margin-bottom:32px">请输入管理员账号密码</p>
            <div id="loginAlert"></div>
            <form onsubmit="handleAdminLogin(event)">
              <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="loginUser" placeholder="admin" required>
              </div>
              <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="loginPass" placeholder="请输入密码" required>
              </div>
              <button type="submit" class="btn btn-primary btn-lg" style="width:100%">管理员登录</button>
            </form>
          </div>
        </div>
      `;
    }

    async function handleAdminLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;

      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        if (data.user.role !== 'admin') throw new Error('需要管理员账号');

        state.token = data.token;
        state.user = data.user;
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_user', JSON.stringify(data.user));
        location.reload();
      } catch (err) {
        const el = document.getElementById('loginAlert');
        if (el) el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function handleLogout() {
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_user');
      location.reload();
    }

    // ============================================================
    // API Helpers
    // ============================================================
    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
      const res = await fetch(API + path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { handleLogout(); return; }
        throw new Error(data.error || '请求失败');
      }
      return data;
    }

    async function apiUpload(path, formData) {
      const headers = {};
      if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
      const res = await fetch(API + path, { method: 'POST', headers, body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '上传失败');
      return data;
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer') || document.body;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    // ============================================================
    // Navigation
    // ============================================================
    function setupSidebar() {
      document.querySelectorAll('#sidebarNav .nav-item').forEach(item => {
        item.addEventListener('click', () => {
          navigateTo(item.dataset.page);
        });
      });
    }

    function navigateTo(page, params = {}) {
      state.currentPage = page;
      document.querySelectorAll('#sidebarNav .nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.page === page);
      });
      // Update mobile bottom nav
      document.querySelectorAll('#mobileBottomNav .mobile-tab-item').forEach(item => {
        item.classList.toggle('active', item.dataset.page === page);
      });
      // Close sidebar on mobile after navigation
      const sidebar = document.getElementById('sidebar');
      if (sidebar && sidebar.classList.contains('open')) {
        toggleSidebar();
      }

      const titles = {
        dashboard: '数据概览', exams: '考试管理', banks: '题库管理', questions: '题目管理',
        results: '成绩分析', submissions: '成绩管理', users: '用户管理'
      };
      document.getElementById('pageTitle').textContent = titles[page] || page;
      document.getElementById('modalContainer').innerHTML = '';

      switch(page) {
        case 'dashboard': loadDashboard(); break;
        case 'exams': loadExamManagement(); break;
        case 'banks': loadBanksManagement(); break;
        case 'questions': loadQuestionManagement(params); break;
        case 'results': loadResultsAnalysis(params); break;
        case 'submissions': loadSubmissionsManagement(); break;
        case 'users': loadUserManagement(); break;
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      if (overlay) overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }

    function closeModal() {
      document.getElementById('modalContainer').innerHTML = '';
    }

    // ============================================================
    // Dashboard — Enhanced with Wrong Answer Analysis
    // ============================================================
    async function loadDashboard() {
      try {
        const data = await api('/api/admin/stats');
        state.stats = data;
        renderDashboard(data);
      } catch (err) {
        showToast('加载数据失败: ' + err.message, 'error');
      }
    }

    function renderDashboard(data) {
      const container = document.getElementById('pageContent');
      container.innerHTML = `
        <div class="stats-grid animate-in">
          <div class="glass-card stat-card">
            <div class="stat-card-icon">👥</div>
            <div class="stat-card-value">${data.totalUsers}</div>
            <div class="stat-card-label">注册考生数</div>
          </div>
          <div class="glass-card stat-card">
            <div class="stat-card-icon">📋</div>
            <div class="stat-card-value">${data.totalExams}</div>
            <div class="stat-card-label">考试总数</div>
          </div>
          <div class="glass-card stat-card">
            <div class="stat-card-icon">📝</div>
            <div class="stat-card-value">${data.totalSubmissions}</div>
            <div class="stat-card-label">提交总数</div>
            <div class="stat-card-trend up">答卷统计</div>
          </div>
          <div class="glass-card stat-card">
            <div class="stat-card-icon">📈</div>
            <div class="stat-card-value">${data.avgScore}</div>
            <div class="stat-card-label">平均分</div>
            <div class="stat-card-trend ${data.passRate >= 60 ? 'up' : ''}" style="color:${data.passRate >= 60 ? 'var(--green)' : 'var(--orange)'};background:${data.passRate >= 60 ? 'rgba(52,199,89,0.1)' : 'rgba(255,149,0,0.1)'}">
              ✅ 通过率 ${data.passRate}%
            </div>
          </div>
        </div>

        <div class="dashboard-grid animate-in">
          <div class="glass-card dashboard-card">
            <div class="dashboard-card-title">
              <span>分数分布</span>
            </div>
            <div class="bar-chart" id="scoreChart">
              ${renderBarChart(data.scoreDistribution)}
            </div>
          </div>
          <div class="glass-card dashboard-card">
            <div class="dashboard-card-title">
              <span>最近提交</span>
            </div>
            <div style="max-height:260px;overflow-y:auto">
              ${renderRecentSubmissions(data.recentSubmissions)}
            </div>
          </div>
        </div>

        <div class="dashboard-grid animate-in" style="grid-template-columns:1fr 1fr">
          <div class="glass-card dashboard-card">
            <div class="dashboard-card-title">
              <span>🔥 错题排行 TOP 10</span>
              <span style="font-size:0.75rem;color:var(--text-tertiary);font-weight:500">错误率从高到低</span>
            </div>
            <div style="max-height:400px;overflow-y:auto">
              ${renderWrongAnswerRanking(data.wrongAnswerRanking)}
            </div>
          </div>
          <div class="glass-card dashboard-card">
            <div class="dashboard-card-title">
              <span>📊 各考试错题占比</span>
            </div>
            <div style="max-height:400px;overflow-y:auto">
              ${renderExamWrongStats(data.examWrongStats)}
            </div>
          </div>
        </div>
      `;
    }

    function renderWrongAnswerRanking(ranking) {
      if (!ranking || ranking.length === 0) return '<p style="color:var(--text-tertiary);text-align:center;padding:40px">暂无数据</p>';
      return ranking.slice(0, 10).map((q, i) => {
        const color = q.wrong_rate >= 60 ? 'var(--red)' : q.wrong_rate >= 30 ? 'var(--orange)' : 'var(--green)';
        return `
          <div style="padding:10px 0;border-bottom:0.5px solid var(--separator)">
            <div class="flex-between" style="font-size:0.82rem;margin-bottom:6px">
              <span style="font-weight:600">${i + 1}. ${escapeHtml(q.question_text.substring(0, 35))}${q.question_text.length > 35 ? '...' : ''}</span>
              <span style="font-weight:700;color:${color}">${q.wrong_rate}%</span>
            </div>
            <div class="wrong-answer-bar">
              <div class="wrong-answer-bar-track">
                <div class="wrong-answer-bar-fill" style="width:${q.wrong_rate}%;background:${color}"></div>
              </div>
              <span style="font-size:0.7rem;color:var(--text-tertiary);min-width:80px;text-align:right">错${q.wrong_count}/${q.total_answers}</span>
            </div>
            <div style="font-size:0.7rem;color:var(--text-quaternary);margin-top:4px">${escapeHtml(q.exam_title)}</div>
          </div>
        `;
      }).join('');
    }

    function renderExamWrongStats(stats) {
      if (!stats || stats.length === 0) return '<p style="color:var(--text-tertiary);text-align:center;padding:40px">暂无数据</p>';
      return stats.map(s => {
        const color = s.wrong_rate >= 50 ? 'var(--red)' : s.wrong_rate >= 25 ? 'var(--orange)' : 'var(--green)';
        return `
          <div style="padding:12px 0;border-bottom:0.5px solid var(--separator)">
            <div class="flex-between" style="font-size:0.85rem;margin-bottom:8px">
              <span style="font-weight:600">${escapeHtml(s.title)}</span>
              <span style="font-weight:700;color:${color}">${s.wrong_rate}%</span>
            </div>
            <div class="wrong-answer-bar">
              <div class="wrong-answer-bar-track">
                <div class="wrong-answer-bar-fill" style="width:${s.wrong_rate}%;background:${color}"></div>
              </div>
              <span style="font-size:0.72rem;color:var(--text-tertiary);min-width:80px;text-align:right">错${s.wrong_count}/${s.total_answers}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderBarChart(distribution) {
      if (!distribution || distribution.length === 0) return '<p style="color:var(--text-tertiary);text-align:center;padding:40px">暂无数据</p>';
      const maxCount = Math.max(...distribution.map(d => d.count), 1);
      const ranges = ['90-100', '80-89', '70-79', '60-69', '0-59'];
      const dataMap = {};
      distribution.forEach(d => { dataMap[d.range] = d.count; });
      return ranges.map(range => {
        const count = dataMap[range] || 0;
        const height = Math.max((count / maxCount) * 160, 4);
        return `
          <div class="bar-item">
            <div class="bar-value">${count}</div>
            <div class="bar-fill-container">
              <div class="bar-fill" style="height:${height}px"></div>
            </div>
            <div class="bar-label">${range}</div>
          </div>
        `;
      }).join('');
    }

    function renderRecentSubmissions(subs) {
      if (!subs || subs.length === 0) return '<p style="color:var(--text-tertiary);text-align:center;padding:40px">暂无提交记录</p>';
      return subs.map(s => `
        <div style="padding:12px 0;border-bottom:0.5px solid var(--separator);font-size:0.82rem">
          <div class="flex-between">
            <span style="font-weight:600">${escapeHtml(s.username)}</span>
            <span style="color:var(--accent);font-weight:700;font-family:var(--font-mono)">${s.total_score}分</span>
          </div>
          <div class="flex-between" style="margin-top:2px">
            <span style="color:var(--text-tertiary);font-size:0.72rem">${escapeHtml(s.exam_title)}</span>
            <span style="color:var(--text-quaternary);font-size:0.68rem">${formatDate(s.submitted_at)}</span>
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // Exam Management
    // ============================================================
    async function loadExamManagement() {
      try {
        const data = await api('/api/admin/exams');
        state.exams = data.exams;
        renderExamManagement();
      } catch (err) {
        showToast('加载考试列表失败', 'error');
      }
    }

    function renderExamManagement() {
      const container = document.getElementById('pageContent');
      container.innerHTML = `
        <div class="flex-between mb-4 animate-in">
          <div style="color:var(--text-tertiary);font-weight:600">共 ${state.exams.length} 场考试</div>
          <button class="btn btn-primary" onclick="showExamModal()">+ 创建考试</button>
        </div>
        <div class="glass-card animate-in" style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>考试名称</th><th>题目数</th><th>时长</th><th>总分/及格线</th>
                <th>提交数</th><th>平均分</th><th>状态</th><th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${state.exams.length === 0
                ? '<tr><td colspan="8" class="text-center" style="padding:40px;color:var(--text-tertiary)">暂无考试，点击右上角创建</td></tr>'
                : state.exams.map(e => `
                  <tr>
                    <td><strong>${escapeHtml(e.title)}</strong>${e.question_config ? ' <span class="tag tag-published" style="font-size:0.7rem;padding:2px 6px">📚题库抽题</span>' : ''}</td>
                    <td>${e.question_count}</td>
                    <td>${e.duration_minutes} 分钟</td>
                    <td>${e.total_score} / ${e.passing_score}</td>
                    <td>${e.submission_count || 0}</td>
                    <td>${e.avg_score || '--'}</td>
                    <td><span class="tag tag-${e.status}">${getStatusName(e.status)}</span></td>
                    <td>
                      <div class="flex gap-2">
                        <button class="btn btn-sm btn-secondary" onclick="navigateTo('questions',{examId:${e.id}})">题目</button>
                        <button class="btn btn-sm btn-secondary" onclick="showExamModal(${e.id})">编辑</button>
                        <button class="btn btn-sm btn-secondary" onclick="navigateTo('results',{examId:${e.id}})">分析</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteExam(${e.id})">删除</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function showExamModal(examId = null) {
      const exam = examId ? state.exams.find(e => e.id === examId) : null;
      let qc = {};
      try { if (exam && exam.question_config) qc = JSON.parse(exam.question_config); } catch(e) {}
      const useBank = qc.use_bank || false;

      fetchBanksForDropdown().then(banksHtml => {
        document.getElementById('modalContainer').innerHTML = `
          <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
            <div class="modal-content" onclick="event.stopPropagation()" style="max-width:720px">
              <h2 class="modal-title">${exam ? '编辑考试' : '创建考试'}</h2>
              <form onsubmit="saveExam(event, ${examId})">
                <div class="form-group">
                  <label class="form-label">考试标题 *</label>
                  <input type="text" class="form-input" id="examTitle" value="${exam ? escapeHtml(exam.title) : ''}" required placeholder="例如: 2024年养护安全知识考核">
                </div>
                <div class="form-group">
                  <label class="form-label">考试描述</label>
                  <textarea class="form-textarea" id="examDesc" placeholder="考试的简要描述">${exam ? escapeHtml(exam.description || '') : ''}</textarea>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
                  <div class="form-group">
                    <label class="form-label">考试时长（分钟）</label>
                    <input type="number" class="form-input" id="examDuration" value="${exam ? exam.duration_minutes : 60}" min="1" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">及格分数线</label>
                    <input type="number" class="form-input" id="examPassingScore" value="${exam ? exam.passing_score : 60}" min="0" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-select" id="examStatus">
                      <option value="draft" ${exam && exam.status === 'draft' ? 'selected' : ''}>草稿</option>
                      <option value="published" ${exam && exam.status === 'published' ? 'selected' : ''}>已发布</option>
                      <option value="closed" ${exam && exam.status === 'closed' ? 'selected' : ''}>已关闭</option>
                    </select>
                  </div>
                </div>
                <div style="background:var(--bg-glass);border-radius:16px;padding:20px;margin:16px 0;border:1px solid var(--separator)">
                  <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600;margin-bottom:${useBank?'16':'0'}px">
                    <input type="checkbox" id="examUseBank" ${useBank ? 'checked' : ''} onchange="toggleBankConfig()">
                    <span>从题库随机抽题（随机抽取，每位考生试卷不同）</span>
                  </label>
                  <div id="bankConfigArea" style="display:${useBank?'block':'none'};margin-top:16px">
                    <p style="font-size:0.8rem;color:var(--text-tertiary);margin-bottom:12px">配置各题型抽取数量，总分自动计算</p>

                    ${buildBankTypeRow('multiple_choice', '多选题', qc, banksHtml)}
                    ${buildBankTypeRow('true_false', '判断题', qc, banksHtml)}
                    ${buildBankTypeRow('short_answer', '简答题', qc, banksHtml)}
                    <div id="examTotalDisplay" style="margin-top:12px;font-size:0.9rem;color:var(--ios-blue);font-weight:600">

              </form>
            </div>
          </div>
        `;
        // Bind change events for bank config calculation
        document.querySelectorAll('.bank-count-input').forEach(el => {

        });
        document.querySelectorAll('.bank-score-input').forEach(el => {

        });

    let _banksCache = null;
    async function fetchBanksForDropdown() {
      if (_banksCache) return _banksCache;
      try {
        const data = await api('/api/admin/banks');
        _banksCache = data.banks || [];
      } catch(e) { _banksCache = []; }
      return _banksCache;
    }

    function buildBankTypeRow(type, label, qc, banksCache) {
      const banks = banksCache || [];
      const cfg = qc[type] || {};
      let opts = '<option value="">不使用</option>';
      banks.forEach(b => {
        opts += `<option value="${b.id}" ${cfg.bank_id == b.id ? 'selected' : ''}>${escapeHtml(b.title)} (${b.question_count || 0}题)</option>`;
      });
      // Also include "手动设置" fallback if no banks
      if (banks.length === 0) opts = '<option value="">暂无可选题库，请先创建题库</option>';
      return `
        <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:10px;align-items:center;margin-bottom:8px">
          <div>
            <span style="font-size:0.83rem;color:var(--text-secondary)">${label}</span>
            <select class="form-select bank-bank-select" data-type="${type}" style="margin-top:4px">${opts}</select>
          </div>
          <div>
            <input type="number" class="form-input bank-count-input" data-type="${type}" value="${cfg.count || 0}" min="0" placeholder="数量" style="text-align:center" ${cfg.bank_id ? '' : 'disabled'}>
          </div>
          <div>
            <input type="number" class="form-input bank-score-input" data-type="${type}" value="${cfg.score_per || 5}" min="1" step="0.5" placeholder="每题分" style="text-align:center" ${cfg.bank_id ? '' : 'disabled'}>
          </div>
        </div>
      `;
    }

    function toggleBankConfig() {
      const use = document.getElementById('examUseBank').checked;
      document.getElementById('bankConfigArea').style.display = use ? 'block' : 'none';
    }

    function calcBankTotalScore() {
      let total = 0;
      document.querySelectorAll('.bank-count-input').forEach(el => {
        const count = parseInt(el.value) || 0;
        const type = el.dataset.type;
        const scoreEl = document.querySelector(`.bank-score-input[data-type="${type}"]`);
        const scorePer = parseFloat(scoreEl?.value) || 5;
        total += count * scorePer;
      });
      document.getElementById('calcTotalScore').textContent = total;
      document.getElementById('examTotalScore').value = total || 0;
    }

    async function saveExam(e, examId) {
      e.preventDefault();
      const useBank = document.getElementById('examUseBank')?.checked || false;
      let questionConfig = null;
      if (useBank) {
        questionConfig = { use_bank: true };
        ['single_choice','multiple_choice','true_false','short_answer'].forEach(t => {
          const bankSel = document.querySelector(`.bank-bank-select[data-type="${t}"]`);
          const countEl = document.querySelector(`.bank-count-input[data-type="${t}"]`);
          const scoreEl = document.querySelector(`.bank-score-input[data-type="${t}"]`);
          if (bankSel && bankSel.value && countEl && parseInt(countEl.value) > 0) {
            questionConfig[t] = { bank_id: parseInt(bankSel.value), count: parseInt(countEl.value), score_per: parseFloat(scoreEl?.value) || 5 };
          }
        });
      }
      const data = {
        title: document.getElementById('examTitle').value.trim(),
        description: document.getElementById('examDesc').value.trim(),
        duration_minutes: parseInt(document.getElementById('examDuration').value),
        total_score: parseInt(document.getElementById('examTotalScore').value) || 100,
        passing_score: parseInt(document.getElementById('examPassingScore').value),
        status: document.getElementById('examStatus').value,
        question_config: questionConfig
      };
      try {
        if (examId) {
          await api('/api/admin/exams/' + examId, { method: 'PUT', body: JSON.stringify(data) });
          showToast('考试更新成功');
        } else {
          await api('/api/admin/exams', { method: 'POST', body: JSON.stringify(data) });
          showToast('考试创建成功');
        }
        _banksCache = null;
        closeModal();
        loadExamManagement();
      } catch (err) { showToast('操作失败: ' + err.message, 'error'); }
    }

    async function deleteExam(examId) {
      const exam = state.exams.find(e => e.id === examId);
      if (!confirm(`确定要删除考试"${exam.title}"吗？\n\n⚠️ 此操作不可撤销，相关的题目和答卷也将被删除。`)) return;
      try {
        await api('/api/admin/exams/' + examId, { method: 'DELETE' });
        showToast('考试已删除');
        loadExamManagement();
      } catch (err) {
        showToast('删除失败: ' + err.message, 'error');
      }
    }

    function showBankQuestionModal(bankId) {
      document.getElementById('modalContainer').innerHTML = `

              </div>
              <div class="form-group">

              </div>
              <div class="form-group">
                <label class="form-label">正确答案 *</label>
                <input type="text" class="form-input" id="bqAnswer" required placeholder="单选题: A/B/C/D, 多选题: A,C,D, 判断题: TRUE/FALSE">
              </div>
              <div class="form-group">

      `;
      onBqTypeChange();

    function onBqTypeChange() {
      const type = document.getElementById('bqType')?.value;
      const optsList = document.getElementById('bqOptionsList');
      const optsArea = document.getElementById('bqOptionsArea');
      if (!type || !optsList || !optsArea) return;
      if (type === 'short_answer') {
        optsArea.style.display = 'none';
        return;
      }
      optsArea.style.display = 'block';
      if (type === 'true_false') {
        optsList.innerHTML = '<span style="color:var(--text-tertiary);font-size:0.85rem">判断题选项固定为: 正确 / 错误</span>';
      } else {
        optsList.innerHTML = ['A','B','C','D','E','F'].map(l => `
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="width:24px;font-weight:600;color:var(--text-secondary)">${l}</span>
            <input type="text" class="form-input" id="bqOpt${l}" placeholder="选项${l}" style="flex:1">
          </div>
        `).join('');
      }
    }

    async function saveBankQuestion(e, bankId) {
      e.preventDefault();
      const type = document.getElementById('bqType').value;
      const text = document.getElementById('bqText').value.trim();
      const answer = document.getElementById('bqAnswer').value.trim();
      const score = parseFloat(document.getElementById('bqScore').value) || 5;
      let options = null;
      if (type === 'single_choice' || type === 'multiple_choice') {
        const opts = [];
        ['A','B','C','D','E','F'].forEach(l => {
          const v = document.getElementById('bqOpt' + l)?.value?.trim();
          if (v) opts.push(v);
        });
        if (opts.length >= 2) options = JSON.stringify(opts);
      } else if (type === 'true_false') options = JSON.stringify(['正确','错误']);
      try {
        await api('/api/admin/banks/' + bankId + '/questions', {
          method: 'POST',
          body: JSON.stringify({ type, question_text: text, options, correct_answer: answer, score })
        });
        showToast('题目添加成功');
        closeModal();
        showBankQuestions(bankId);
      } catch (err) { showToast('添加失败: ' + err.message, 'error'); }
    }

    async function deleteBankQuestion(qId, bankId) {
      if (!confirm('确定删除该题目吗？')) return;
      try {
        await api('/api/admin/bank-questions/' + qId, { method: 'DELETE' });
        showToast('题目已删除');
        showBankQuestions(bankId);
      } catch (err) { showToast('删除失败: ' + err.message, 'error'); }
    }

    function showBankImportModal(bankId) {
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="modal-title">Excel 导入题目</h2>
            <form onsubmit="importBankQuestions(event, ${bankId})">
              <p style="margin-bottom:12px;color:var(--text-tertiary);font-size:0.85rem">
                支持列: 题型, 题目, 选项A~F, 正确答案, 分值。题型: 单选/多选/判断/简答
              </p>
              <div class="form-group">
                <label class="form-label">选择 Excel 文件 (.xlsx/.xls)</label>
                <input type="file" class="form-input" id="bankFile" accept=".xlsx,.xls" required>
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">开始导入</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    async function importBankQuestions(e, bankId) {
      e.preventDefault();
      const fileInput = document.getElementById('bankFile');
      if (!fileInput.files[0]) return showToast('请选择文件', 'error');
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      try {
        const res = await fetch(API + '/api/admin/banks/' + bankId + '/questions/import-excel', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + state.token },
          body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '导入失败');
        showToast(`成功导入 ${data.imported} 题` + (data.errors?.length ? `，${data.errors.length}条失败` : ''));
        if (data.errors) console.warn('Import errors:', data.errors);
        closeModal();
        _banksCache = null;
        showBankQuestions(bankId);
      } catch (err) { showToast('导入失败: ' + err.message, 'error'); }
    }

    function getTypeLabel(type) {
      const m = { single_choice: '单选', multiple_choice: '多选', true_false: '判断', short_answer: '简答' };
      return m[type] || type;
    }

    let _questionData = null;

    async function showQuestionModal(qId = null) {
      if (qId && state.currentExamId) {
        try {
          const data = await api('/api/admin/questions/' + state.currentExamId);
          _questionData = data.questions.find(q => q.id === qId) || {};
        } catch(e) { _questionData = {}; }
      }
      const q = qId ? _questionData : {};
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="modal-title">${qId ? '编辑题目' : '添加题目'}</h2>
            <form onsubmit="saveQuestion(event, ${qId || 'null'})">
              <div class="form-group">
                <label class="form-label">题型 *</label>
                <select class="form-select" id="qType" onchange="onQuestionTypeChange()">
                  <option value="single_choice" ${q.type === 'single_choice' ? 'selected' : ''}>单选题</option>
                  <option value="multiple_choice" ${q.type === 'multiple_choice' ? 'selected' : ''}>多选题</option>
                  <option value="true_false" ${q.type === 'true_false' ? 'selected' : ''}>判断题</option>
                  <option value="short_answer" ${q.type === 'short_answer' ? 'selected' : ''}>简答题</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">题目内容 *</label>
                <textarea class="form-textarea" id="qText" required placeholder="请输入题目内容">${escapeHtml(q.question_text || '')}</textarea>
              </div>
              <div id="optionsContainer">${renderQuestionOptions(q)}</div>
              <div class="form-group">
                <label class="form-label">正确答案 *</label>
                <input type="text" class="form-input" id="qAnswer" value="${escapeHtml(String(q.correct_answer || ''))}" required
                  placeholder="选择题填选项字母(如 A 或 A,C)，判断题填 TRUE/FALSE">
              </div>
              <div class="form-group">
                <label class="form-label">分值</label>
                <input type="number" class="form-input" id="qScore" value="${q.score || 1}" min="0.5" step="0.5">
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">${qId ? '保存修改' : '添加题目'}</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    function renderQuestionOptions(q) {
      const type = q.type || 'single_choice';
      if (type === 'short_answer') return '';
      let ops = [];
      try { ops = q.options ? JSON.parse(q.options) : []; } catch(e) { ops = []; }
      if (type === 'true_false') ops = ['正确', '错误'];
      const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
      let html = '<label class="form-label">选项</label>';
      for (let i = 0; i < 4; i++) {
        html += `
          <div class="form-group" style="display:flex;align-items:center;gap:8px">
            <span style="font-weight:600;min-width:20px;color:var(--text-tertiary)">${labels[i]}</span>
            <input type="text" class="form-input q-option" data-index="${i}" value="${escapeHtml(ops[i] || '')}" placeholder="选项 ${labels[i]}">
          </div>
        `;
      }
      return html;
    }

    function onQuestionTypeChange() {
      const type = document.getElementById('qType').value;
      document.getElementById('optionsContainer').innerHTML = renderQuestionOptions({ type });
    }

    async function saveQuestion(e, qId) {
      e.preventDefault();
      const type = document.getElementById('qType').value;
      const text = document.getElementById('qText').value.trim();
      const answer = document.getElementById('qAnswer').value.trim();
      const score = parseFloat(document.getElementById('qScore').value) || 1;
      let options = null;
      if (type !== 'short_answer') {
        const optionInputs = document.querySelectorAll('.q-option');
        options = Array.from(optionInputs).map(inp => inp.value.trim()).filter(v => v);
      }
      try {
        if (qId) {
          await api('/api/admin/questions/' + qId, { method: 'DELETE' });
        }
        await api('/api/admin/exams/' + state.currentExamId + '/questions', {
          method: 'POST',
          body: JSON.stringify({ type, question_text: text, options, correct_answer: answer, score })
        });
        showToast(qId ? '题目已更新' : '题目已添加');
        closeModal();
        navigateTo('questions', { examId: state.currentExamId });
      } catch (err) {
        showToast('保存失败: ' + err.message, 'error');
      }
    }

    async function deleteQuestion(qId) {
      if (!confirm('确定要删除这道题目吗？')) return;
      try {
        await api('/api/admin/questions/' + qId, { method: 'DELETE' });
        showToast('题目已删除');
        navigateTo('questions', { examId: state.currentExamId });
      } catch (err) {
        showToast('删除失败: ' + err.message, 'error');
      }
    }

    function switchImportTab(tab) {
      const excelPanel = document.getElementById('excelImportPanel');
      const jsonPanel = document.getElementById('jsonImportPanel');
      const btnExcel = document.getElementById('tabExcel');
      const btnJson = document.getElementById('tabJson');
      const btnImport = document.getElementById('btnDoImport');

      if (tab === 'excel') {
        excelPanel.style.display = '';
        jsonPanel.style.display = 'none';
        btnExcel.className = 'btn btn-primary btn-sm';
        btnJson.className = 'btn btn-secondary btn-sm';
        btnImport.style.display = 'none';
      } else {
        excelPanel.style.display = 'none';
        jsonPanel.style.display = '';
        btnExcel.className = 'btn btn-secondary btn-sm';
        btnJson.className = 'btn btn-primary btn-sm';
        btnImport.style.display = '';
      }
    }

    function downloadExcelTemplate() {
      const link = document.createElement('a');
      link.href = API + '/api/admin/template/excel';
      const token = state.token;
      // Use fetch with auth header
      fetch(API + '/api/admin/template/excel', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.blob()).then(blob => {
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = '题目导入模板.xlsx';
        link.click();
        URL.revokeObjectURL(url);
      }).catch(() => showToast('下载模板失败', 'error'));
    }

    async function handleExcelUpload(event, examId) {
      const file = event.target.files[0];
      if (!file) return;

      const resultDiv = document.getElementById('excelUploadResult');
      resultDiv.innerHTML = '<p style="color:var(--text-tertiary);text-align:center;padding:20px">⏳ 正在解析并导入...</p>';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const data = await apiUpload('/api/admin/exams/' + examId + '/questions/import-excel', formData);
        resultDiv.innerHTML = `
          <div style="background:rgba(52,199,89,0.08);border-radius:var(--radius-md);padding:16px">
            <p style="font-weight:700;color:var(--green);margin-bottom:8px">✅ ${data.message}</p>
            ${data.errors && data.errors.length > 0 ? `
              <details style="margin-top:8px">
                <summary style="cursor:pointer;font-size:0.8rem;color:var(--orange)">查看 ${data.errors.length} 个错误</summary>
                <div style="margin-top:8px;max-height:200px;overflow-y:auto">
                  ${data.errors.map(e => `<div style="font-size:0.75rem;color:var(--danger);padding:4px 0">${escapeHtml(e)}</div>`).join('')}
                </div>
              </details>
            ` : ''}
          </div>
        `;
        showToast(data.message);
      } catch (err) {
        resultDiv.innerHTML = `<div style="background:rgba(255,59,48,0.08);border-radius:var(--radius-md);padding:16px"><p style="color:var(--danger);font-weight:600">❌ ${escapeHtml(err.message)}</p></div>`;
        showToast('Excel导入失败: ' + err.message, 'error');
      }
    }

    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('importJson').value = e.target.result;
        previewImport();
      };
      reader.readAsText(file);
    }

    function previewImport() {
      try {
        const data = JSON.parse(document.getElementById('importJson').value);
        const preview = document.getElementById('importPreview');
        preview.classList.remove('hidden');
        preview.innerHTML = data.slice(0, 10).map((q, i) => `
          <div class="import-preview-item">
            <span class="badge badge-info">${getTypeName(q.type)}</span>
            <span>${escapeHtml(q.question_text.substring(0, 50))}${q.question_text.length > 50 ? '...' : ''}</span>
            <span style="margin-left:auto;color:var(--text-tertiary)">答案: ${escapeHtml(String(q.correct_answer))}</span>
          </div>
        `).join('');
        if (data.length > 10) {
          preview.innerHTML += `<div class="import-preview-item" style="color:var(--text-tertiary)">... 还有 ${data.length - 10} 题</div>`;
        }
      } catch(e) {
        showToast('JSON格式错误', 'error');
      }
    }

    async function doJsonImport(examId) {
      let questions;
      try {
        questions = JSON.parse(document.getElementById('importJson').value);
      } catch(e) {
        showToast('JSON格式错误，请检查', 'error');
        return;
      }
      if (!Array.isArray(questions) || questions.length === 0) {
        showToast('请提供有效的题目数组', 'error');
        return;
      }
      try {
        const result = await api('/api/admin/exams/' + examId + '/questions/import', {
          method: 'POST',
          body: JSON.stringify({ questions })
        });
        showToast(result.message);
        closeModal();
        navigateTo('questions', { examId });
      } catch (err) {
        showToast('导入失败: ' + err.message, 'error');
      }
    }

    document.addEventListener('input', (e) => {
      if (e.target.id === 'importJson') previewImport();
    });

        ? Math.round(stats.passed_count / stats.total_candidates * 100) : 0;

      container.innerHTML = `
        <div style="margin-bottom:16px;cursor:pointer;color:var(--text-tertiary);font-weight:600" onclick="navigateTo('results')" class="animate-in">← 返回列表</div>

            <div class="stat-card-label">参加人数</div>
          </div>
          <div class="glass-card stat-card">
            <div class="stat-card-icon">📊</div>
            <div class="stat-card-value">${stats ? stats.avg_score : '--'}</div>
            <div class="stat-card-label">平均分</div>
          </div>
          <div class="glass-card stat-card">
            <div class="stat-card-icon">🏆</div>
            <div class="stat-card-value">${stats ? stats.max_score : '--'}</div>

            <div class="stat-card-value">${passRate}%</div>
            <div class="stat-card-label">通过率 (≥${exam.passing_score}分)</div>
            <div class="stat-card-trend ${passRate >= 60 ? 'up' : ''}">${stats ? stats.passed_count : 0}人通过</div>
          </div>
        </div>

        <div class="dashboard-grid animate-in">
          <div class="glass-card dashboard-card">
            <div class="dashboard-card-title">
              <span>🔥 各题错题率</span>
              <span style="font-size:0.72rem;color:var(--text-tertiary);font-weight:500">错误率从高到低</span>
            </div>
            <div style="max-height:450px;overflow-y:auto">
              ${questionStats && questionStats.length > 0 ? questionStats.map((qs, i) => {
                const wrongRate = qs.wrong_rate || 0;
                const color = wrongRate >= 60 ? 'var(--red)' : wrongRate >= 30 ? 'var(--orange)' : 'var(--green)';

                  <div style="padding:12px 0;border-bottom:0.5px solid var(--separator)">

                    </div>

              }).join('') : '<p style="color:var(--text-tertiary);text-align:center;padding:20px">暂无数据</p>'}
            </div>
          </div>
          <div class="glass-card dashboard-card">

    async function exportResults(examId) {
      try {
        const res = await fetch(API + '/api/admin/export/' + examId, {
          headers: { 'Authorization': 'Bearer ' + state.token }
        });
        if (!res.ok) throw new Error('导出失败');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `成绩导出_${new Date().toISOString().slice(0, 10)}.xlsx`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Excel导出成功');
      } catch (err) {
        showToast('导出失败', 'error');
      }
    }

                      <td>${s.exam_total_score || '--'}</td>
                      <td>${isPassed ? '<span class="badge badge-success">通过</span>' : '<span class="badge badge-danger">未通过</span>'}</td>
                      <td style="font-size:0.78rem;color:var(--text-tertiary)">${formatDate(s.submitted_at)}</td>
                      <td>
                        <button class="btn btn-sm btn-secondary" onclick="viewSubmissionDetail(${s.id})">详情</button>
                      </td>
                    </tr>
                  `;
                  }).join('')}
              </tbody>
            </table>
          </div>

          ${data.pagination && data.pagination.totalPages > 1 ? `
            <div class="pagination-bar" style="display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;padding:12px 0">
              <button class="btn btn-sm btn-secondary" ${data.pagination.page <= 1 ? 'disabled' : ''}
                onclick="submissionsState.page=${data.pagination.page - 1};loadSubmissionsManagement()">‹ 上一页</button>
              <span style="font-size:0.85rem;color:var(--text-tertiary);font-weight:600">
                第 ${data.pagination.page} / ${data.pagination.totalPages} 页（共 ${data.pagination.total} 条）
              </span>
              <button class="btn btn-sm btn-secondary" ${data.pagination.page >= data.pagination.totalPages ? 'disabled' : ''}
                onclick="submissionsState.page=${data.pagination.page + 1};loadSubmissionsManagement()">下一页 ›</button>
            </div>
          ` : ''}

          <div style="color:var(--text-tertiary);font-size:0.75rem;text-align:center;margin-top:12px">
            ${data.pagination ? `共 ${data.pagination.total} 条记录` : ''}
          </div>
        </div>
      `;

      // Ensure exams are loaded for filter dropdown
      if (!state.exams || state.exams.length === 0) {
        api('/api/admin/exams').then(d => { state.exams = d.exams; });
      }
    }

    function generateMonthOptions(selected) {
      const months = [];
      const now = new Date();
      for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const value = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        const label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
        months.push(`<option value="${value}" ${value === selected ? 'selected' : ''}>${label}</option>`);
      }
      return months.join('');
    }

    async function exportSubmissionsExcel() {
      try {
        const params = new URLSearchParams();
        if (submissionsState.month) params.set('month', submissionsState.month);
        if (submissionsState.work_zone) params.set('work_zone', submissionsState.work_zone);
        if (submissionsState.exam_id) params.set('exam_id', submissionsState.exam_id);

        const queryString = params.toString();
        const url = API + '/api/admin/submissions/export' + (queryString ? '?' + queryString : '');

        const res = await fetch(url, {
          headers: { 'Authorization': 'Bearer ' + state.token }
        });

        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.error || '导出失败');
        }

        const blob = await res.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        const filename = '成绩导出' + (submissionsState.month ? '_' + submissionsState.month : '') + '.xlsx';
        a.download = filename;
        a.click();
        URL.revokeObjectURL(downloadUrl);
        showToast('Excel导出成功');
      } catch (err) {
        showToast('导出失败: ' + err.message, 'error');
      }
    }

    async function viewSubmissionDetail(submissionId) {
      try {
        const data = await api('/api/submissions/' + submissionId + '/result');
        const { submission, answers } = data;
        const isPassed = submission.exam_total_score ? submission.total_score >= submission.exam_total_score * 0.6 : true;

        document.getElementById('modalContainer').innerHTML = `
          <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
            <div class="modal-content" style="max-width:700px" onclick="event.stopPropagation()">
              <h2 class="modal-title">答卷详情</h2>
              <div style="display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap">
                <div><span style="color:var(--text-tertiary);font-size:0.78rem">考生</span><br><strong>${escapeHtml(submission.username || '--')}</strong></div>
                <div><span style="color:var(--text-tertiary);font-size:0.78rem">考试</span><br><strong>${escapeHtml(submission.exam_title)}</strong></div>
                <div><span style="color:var(--text-tertiary);font-size:0.78rem">得分</span><br><strong style="color:${isPassed ? 'var(--green)' : 'var(--red)'};font-size:1.2rem">${submission.total_score}</strong> / ${submission.exam_total_score}</div>
                <div><span style="color:var(--text-tertiary);font-size:0.78rem">提交时间</span><br>${formatDate(submission.submitted_at)}</div>
              </div>
              <div style="max-height:50vh;overflow-y:auto">
                ${answers.map((a, i) => `
                  <div style="padding:12px;margin-bottom:8px;border-radius:var(--radius-md);background:var(--bg-tertiary);border-left:3px solid ${a.is_correct ? 'var(--green)' : 'var(--red)'}">
                    <div style="font-weight:600;font-size:0.9rem;margin-bottom:6px">${i + 1}. ${escapeHtml(a.question_text)}</div>
                    <div style="font-size:0.8rem;color:var(--green)">✅ 正确答案: ${escapeHtml(String(a.correct_answer))}</div>
                    <div style="font-size:0.8rem;color:${a.is_correct ? 'var(--green)' : 'var(--red)'}">
                      ${a.is_correct ? '✅' : '❌'} 考生答案: ${escapeHtml(String(a.user_answer || '(未作答)'))}
                      (${a.score_awarded}/${a.question_score}分)
                    </div>
                  </div>
                `).join('')}
              </div>
              <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        showToast('加载详情失败: ' + err.message, 'error');
      }
    }

    // ============================================================
    // User Management — Full CRUD
    // ============================================================
    async function loadUserManagement() {
      try {
        const data = await api('/api/admin/users');
        renderUserManagement(data.users);
      } catch (err) {
        showToast('加载用户列表失败', 'error');
      }
    }

    function renderUserManagement(users) {
      document.getElementById('pageContent').innerHTML = `
        <div class="flex-between mb-4 animate-in">
          <div style="color:var(--text-tertiary);font-weight:600">共 ${users.length} 名用户</div>
          <div class="flex gap-2">
            <button class="btn btn-secondary" onclick="showUserImportModal()">📥 批量导入</button>
            <button class="btn btn-primary" onclick="showUserModal()">+ 添加用户</button>
          </div>
        </div>
        <div class="glass-card animate-in" style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>用户名</th><th>养护工区</th><th>角色</th><th>提交数</th>
                <th>平均分</th><th>注册时间</th><th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${users.length === 0
                ? '<tr><td colspan="7" class="text-center" style="padding:40px;color:var(--text-tertiary)">暂无用户</td></tr>'
                : users.map(u => `
                  <tr>
                    <td><strong>${escapeHtml(u.username)}</strong></td>
                    <td>${escapeHtml(u.work_zone || '--')}</td>
                    <td><span class="badge ${u.role === 'admin' ? 'badge-warning' : 'badge-info'}">${u.role === 'admin' ? '管理员' : '考生'}</span></td>
                    <td>${u.submission_count || 0}</td>
                    <td>${u.avg_score || '--'}</td>
                    <td style="font-size:0.78rem;color:var(--text-tertiary)">${formatDate(u.created_at)}</td>
                    <td>
                      <div class="flex gap-2">
                        <button class="btn btn-sm btn-secondary" onclick="showPasswordModal(${u.id}, '${escapeHtml(u.username)}')">改密码</button>
                        ${u.role !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id}, '${escapeHtml(u.username)}')">删除</button>` : ''}
                      </div>
                    </td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function showUserModal() {
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="modal-title">添加用户</h2>
            <form onsubmit="createUser(event)">
              <div class="form-group">
                <label class="form-label">用户名 *</label>
                <input type="text" class="form-input" id="newUsername" required placeholder="请输入用户名">
              </div>
              <div class="form-group">
                <label class="form-label">养护工区 *</label>
                <input type="text" class="form-input" id="newWorkZone" required placeholder="请输入养护工区名称">
              </div>
              <div class="form-group">
                <label class="form-label">密码 *</label>
                <input type="password" class="form-input" id="newPassword" required placeholder="至少3位" minlength="3">
              </div>
              <div class="form-group">
                <label class="form-label">角色</label>
                <select class="form-select" id="newRole">
                  <option value="student">考生</option>
                  <option value="admin">管理员</option>
                </select>
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">创建用户</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    async function createUser(e) {
      e.preventDefault();
      const data = {
        username: document.getElementById('newUsername').value.trim(),
        work_zone: document.getElementById('newWorkZone').value.trim(),
        password: document.getElementById('newPassword').value,
        role: document.getElementById('newRole').value
      };
      try {
        await api('/api/admin/users', { method: 'POST', body: JSON.stringify(data) });
        showToast('用户创建成功');
        closeModal();
        loadUserManagement();
      } catch (err) {
        showToast('创建失败: ' + err.message, 'error');
      }
    }

    function showPasswordModal(userId, username) {
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-content" onclick="event.stopPropagation()" style="max-width:440px">
            <h2 class="modal-title">重置密码</h2>
            <p style="color:var(--text-tertiary);margin-bottom:24px;font-size:0.9rem">为用户 <strong style="color:var(--text-primary)">${escapeHtml(username)}</strong> 设置新密码</p>
            <form onsubmit="resetPassword(event, ${userId})">
              <div class="form-group">
                <label class="form-label">新密码 *</label>
                <input type="password" class="form-input" id="resetPassword" required placeholder="至少3位" minlength="3">
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">确认重置</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    async function resetPassword(e, userId) {
      e.preventDefault();
      const newPassword = document.getElementById('resetPassword').value;
      try {
        await api('/api/admin/users/' + userId + '/password', {
          method: 'PUT',
          body: JSON.stringify({ newPassword })
        });
        showToast('密码已重置');
        closeModal();
      } catch (err) {
        showToast('重置失败: ' + err.message, 'error');
      }
    }

    async function deleteUser(userId, username) {
      if (!confirm(`确定要删除用户 "${username}" 吗？\n\n⚠️ 该用户的所有考试记录也将被删除，此操作不可撤销。`)) return;
      try {
        await api('/api/admin/users/' + userId, { method: 'DELETE' });
        showToast('用户已删除');
        loadUserManagement();
      } catch (err) {
        showToast('删除失败: ' + err.message, 'error');
      }
    }

    function showUserImportModal() {
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal-content" style="max-width:600px" onclick="event.stopPropagation()">
            <h2 class="modal-title">批量导入用户</h2>
            <div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:16px;margin-bottom:16px">
              <p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.6">
                <strong>Excel 格式说明：</strong><br>
                列标题：用户名、密码、养护工区<br>
                密码默认为 123456
              </p>
            </div>
            <div class="import-zone" onclick="document.getElementById('userExcelFile').click()">
              <div class="import-zone-icon">📊</div>
              <div class="import-zone-text">点击上传 Excel 文件</div>
              <div class="import-zone-hint">支持 .xlsx / .xls 格式</div>
            </div>
            <input type="file" id="userExcelFile" accept=".xlsx,.xls" style="display:none" onchange="handleUserExcelUpload(event)">
            <div id="userUploadResult" style="margin-top:16px"></div>
            <div class="modal-actions">
              <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
            </div>
          </div>
        </div>
      `;
    }

    async function handleUserExcelUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const resultDiv = document.getElementById('userUploadResult');
      resultDiv.innerHTML = '<p style="color:var(--text-tertiary);text-align:center;padding:20px">⏳ 正在导入...</p>';
      const formData = new FormData();
      formData.append('file', file);
      try {
        const data = await apiUpload('/api/admin/users/import', formData);
        resultDiv.innerHTML = `
          <div style="background:rgba(52,199,89,0.08);border-radius:var(--radius-md);padding:16px">
            <p style="font-weight:700;color:var(--green)">✅ ${data.message}</p>
            ${data.errors && data.errors.length > 0 ? `
              <details style="margin-top:8px">
                <summary style="cursor:pointer;font-size:0.8rem;color:var(--orange)">查看 ${data.errors.length} 个错误</summary>
                <div style="margin-top:8px;max-height:200px;overflow-y:auto">
                  ${data.errors.map(e => `<div style="font-size:0.75rem;color:var(--danger);padding:4px 0">${escapeHtml(e)}</div>`).join('')}
                </div>
              </details>
            ` : ''}
          </div>
        `;
        showToast(data.message);
        loadUserManagement();
      } catch (err) {
        resultDiv.innerHTML = `<div style="background:rgba(255,59,48,0.08);border-radius:var(--radius-md);padding:16px"><p style="color:var(--danger);font-weight:600">❌ ${escapeHtml(err.message)}</p></div>`;
      }
    }

    // ============================================================
    // Utilities
    // ============================================================
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '--';
      const d = new Date(dateStr);
      return d.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    }

    function getStatusName(status) {
      const names = { draft: '草稿', published: '已发布', closed: '已关闭' };
      return names[status] || status;
    }

    function getTypeName(type) {
      const names = { single_choice: '单选题', multiple_choice: '多选题', true_false: '判断题', short_answer: '简答题' };
      return names[type] || type;
    }
  </script>
</body>
</html>
